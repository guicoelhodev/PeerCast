name: Release desktop apps

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin --bundles dmg
          - platform: macos-latest
            args: --target x86_64-apple-darwin --bundles dmg
          - platform: ubuntu-22.04
            args: --bundles appimage,deb
          - platform: windows-latest
            args: --bundles msi,nsis

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ startsWith(matrix.platform, 'macos') && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo sed -i -E \
            's|https?://(azure\.)?archive\.ubuntu\.com/ubuntu/?|https://snapshot.ubuntu.com/ubuntu/20241001T000000Z/|g; s|https?://security\.ubuntu\.com/ubuntu/?|https://snapshot.ubuntu.com/ubuntu/20241001T000000Z/|g' \
            /etc/apt/sources.list
          sudo apt-get -o Acquire::Check-Valid-Until=false update
          sudo apt-get install -y libappindicator3-dev librsvg2-dev patchelf
          sudo apt-get install -y --allow-downgrades \
            libwebkit2gtk-4.1-0=2.44.3-0ubuntu0.22.04.1 \
            libwebkit2gtk-4.1-dev=2.44.3-0ubuntu0.22.04.1 \
            libjavascriptcoregtk-4.1-0=2.44.3-0ubuntu0.22.04.1 \
            libjavascriptcoregtk-4.1-dev=2.44.3-0ubuntu0.22.04.1 \
            gir1.2-javascriptcoregtk-4.1=2.44.3-0ubuntu0.22.04.1 \
            gir1.2-webkit2-4.1=2.44.3-0ubuntu0.22.04.1

      - name: Build installers and publish the GitHub Release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: pnpm tauri
          tagName: ${{ github.ref_name }}
          releaseName: PeerCast ${{ github.ref_name }}
          releaseBody: "Baixe o instalador correspondente ao seu sistema operacional. Apenas quem vai transmitir precisa instalar o PeerCast; participantes entram pelo link da sala no navegador e pelo Tailscale."
          generateReleaseNotes: true
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
