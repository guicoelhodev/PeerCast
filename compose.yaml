services:
  tailscale:
    image: tailscale/tailscale:stable
    network_mode: host
    environment:
      TS_AUTHKEY: ${TAILSCALE_AUTHKEY:?Set TAILSCALE_AUTHKEY in .env}
      TS_AUTH_ONCE: "true"
      TS_HOSTNAME: peercast
      TS_STATE_DIR: /var/lib/tailscale
    volumes:
      - tailscale-state:/var/lib/tailscale
    restart: unless-stopped

volumes:
  tailscale-state:
